<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
  <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Void Runner V2</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#050505;
font-family:monospace;
user-select:none;
-webkit-user-select:none;
-webkit-touch-callout:none;
touch-action:none;
}

canvas{
display:block;
width:100vw;
height:100vh;
}
</style>
</head>

<body ontouchstart="">
  
<canvas id="game"></canvas>

<div id="touchblock"></div>
<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let w,h;
let mobile=false;

const player={
x:80,
y:0,
size:34,
vy:0,
gravity:0.7,
jump:-13,
ground:0
};

let holding=false;

function resize(){

w=canvas.width=window.innerWidth;
h=canvas.height=window.innerHeight;

mobile=h>w;

player.ground=mobile?h-180:h-120;

if(mobile){
player.x=55;
player.size=28;
player.gravity=0.6;
player.jump=-11;
}else{
player.x=80;
player.size=34;
player.gravity=0.7;
player.jump=-13;
}

player.y=player.ground-player.size;
}

resize();

window.addEventListener("resize",resize);

function press(){

if(player.y>=player.ground-player.size-1){
player.vy=player.jump;
}

holding=true;
}

function release(){
holding=false;
}

window.addEventListener("pointerdown",(e)=>{
e.preventDefault();
press();
},{passive:false});

window.addEventListener("pointerup",release);

window.addEventListener("keydown",(e)=>{

if(e.code==="Space"){

e.preventDefault();

press();
}

});

window.addEventListener("keyup",(e)=>{

if(e.code==="Space"){
release();
}

});

function update(){

if(holding && player.vy<0){
player.vy-=0.18;
}

player.vy+=player.gravity;

player.y+=player.vy;

if(player.y>player.ground-player.size){

player.y=player.ground-player.size;
player.vy=0;
}
}

function draw(){

ctx.fillStyle="#050505";
ctx.fillRect(0,0,w,h);

ctx.fillStyle="rgba(255,255,255,0.08)";
ctx.fillRect(0,player.ground,w,2);

ctx.fillStyle="white";
ctx.fillRect(
player.x,
player.y,
player.size,
player.size
);

ctx.fillStyle="rgba(255,255,255,0.3)";
ctx.font="14px monospace";

ctx.fillText(
mobile?"MOBILE TEST":"DESKTOP TEST",
20,
30
);
}

function loop(){

update();
draw();

requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
